  #   command: pnpm --filter @auditoria-blockchain/web dev

  # phpMyAdmin (opcional - para gerenciar banco visualmente)
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: auditoria-blockchain-phpmyadmin
    restart: unless-stopped
    depends_on:
      - mysql
    environment:
      PMA_HOST: mysql
      PMA_USER: ${DB_USER:-blockchain_user}
      PMA_PASSWORD: ${DB_PASSWORD:-blockchain_password}
      PMA_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password}
    ports:
      - "${PHPMYADMIN_PORT:-8080}:80"
    networks:
      - blockchain-network

volumes:
  mysql_data:
    driver: local

networks:
  blockchain-network:
    driver: bridge
