version: "3.9"

services:
  # Banco de dados MySQL
  mysql:
    image: mysql:8.0
    container_name: auditoria-blockchain-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: ${DB_NAME:-auditoria_blockchain}
      MYSQL_USER: ${DB_USER:-blockchain_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-blockchain_password}
      MYSQL_ROOT_HOST: "%"
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      # Persistir dados do banco entre containers
      - mysql_data:/var/lib/mysql
    networks:
      - blockchain-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10 
      interval: 10s

